<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>💰 轻记账 · 个人财务小助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 1rem 1rem 2rem;
            color: #1e293b;
        }

        /* 主容器，移动优先，最大宽度限定 */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 头部 */
        .app-header {
            margin-bottom: 1.2rem;
            text-align: center;
        }

        .app-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2b6e4f, #1e9669);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* 统计卡片区 */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 1.8rem;
            padding: 1rem 0.8rem;
            flex: 1;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            text-align: center;
            transition: transform 0.1s;
            border: 1px solid #eef2ff;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5b6e8c;
            margin-bottom: 0.4rem;
        }

        .stat-number {
            font-size: 1.65rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .balance .stat-number {
            color: #0f172a;
        }

        .income .stat-number {
            color: #2b9348;
        }

        .expense .stat-number {
            color: #e03a3a;
        }

        /* 表单卡片 */
        .form-card {
            background: white;
            border-radius: 1.8rem;
            padding: 1.2rem 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            border: 1px solid #e9edf2;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-bottom: 0.9rem;
        }

        .form-group {
            flex: 1;
            min-width: 120px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #5b6e8c;
            margin-bottom: 0.2rem;
        }

        input, select, .form-group input, .form-group select {
            width: 100%;
            padding: 0.7rem 0.8rem;
            border-radius: 1.5rem;
            border: 1px solid #dce3ec;
            background: #ffffff;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #1e9669;
            box-shadow: 0 0 0 3px rgba(30, 150, 105, 0.2);
        }

        .double-btn-group {
            display: flex;
            gap: 0.7rem;
            margin-top: 0.5rem;
        }

        .btn {
            border: none;
            background: #f0f2f5;
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background: #1e9669;
            color: white;
            box-shadow: 0 2px 6px rgba(30,150,105,0.3);
        }

        .btn-primary:active {
            background: #157a54;
            transform: scale(0.97);
        }

        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
            color: #334155;
        }

        .btn-outline:active {
            background: #f1f5f9;
        }

        .btn-danger {
            background: #ffe5e5;
            color: #c2412c;
        }

        .btn-danger:active {
            background: #ffcece;
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 0.6rem;
            background: white;
            padding: 0.5rem;
            border-radius: 3rem;
            margin-bottom: 1rem;
            justify-content: center;
            border: 1px solid #eef2ff;
        }

        .filter-chip {
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            color: #4a5b7a;
        }

        .filter-chip.active {
            background: #1e9669;
            color: white;
            box-shadow: 0 2px 6px rgba(30,150,105,0.2);
        }

        /* 交易列表 */
        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 0.5rem 0 1rem 0;
            padding: 0 0.2rem;
        }

        .transactions-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .clear-all-btn {
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            color: #5e6f8d;
            cursor: pointer;
        }

        .transaction-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .transaction-item {
            background: white;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            border: 1px solid #ecf3fa;
            transition: 0.1s;
        }

        .tx-info {
            flex: 1;
        }

        .tx-desc {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: baseline;
        }

        .tx-category {
            font-size: 0.65rem;
            background: #eef2ff;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            color: #365e7e;
        }

        .tx-date {
            font-size: 0.7rem;
            color: #7c8ea0;
        }

        .tx-amount {
            font-weight: 700;
            font-size: 1.1rem;
            margin-right: 0.8rem;
            min-width: 80px;
            text-align: right;
        }

        .income-amount {
            color: #2b9348;
        }

        .expense-amount {
            color: #e03a3a;
        }

        .tx-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 1.5rem;
            transition: background 0.1s;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:active {
            background: #eef2ff;
            transform: scale(0.94);
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #8ba0bc;
            background: white;
            border-radius: 2rem;
            margin-top: 0.5rem;
        }

        footer {
            margin-top: 1.2rem;
            text-align: center;
            font-size: 0.65rem;
            color: #8ba0bc;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>💰 轻记账</h1>
        <p style="font-size: 0.75rem; color: #5f7f9e;">记录每一笔，心中有数</p>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card balance">
            <div class="stat-label">💰 余额</div>
            <div class="stat-number" id="balanceAmount">¥0.00</div>
        </div>
        <div class="stat-card income">
            <div class="stat-label">📈 总收入</div>
            <div class="stat-number" id="totalIncome">¥0.00</div>
        </div>
        <div class="stat-card expense">
            <div class="stat-label">📉 总支出</div>
            <div class="stat-number" id="totalExpense">¥0.00</div>
        </div>
    </div>

    <!-- 记账表单 -->
    <div class="form-card">
        <div class="form-row">
            <div class="form-group" style="flex:2">
                <label>📝 描述</label>
                <input type="text" id="descInput" placeholder="例：咖啡、工资" autocomplete="off">
            </div>
            <div class="form-group">
                <label>💰 金额</label>
                <input type="number" id="amountInput" placeholder="0.00" step="0.01">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>📂 类型</label>
                <select id="typeSelect">
                    <option value="expense">💸 支出</option>
                    <option value="income">💵 收入</option>
                </select>
            </div>
            <div class="form-group">
                <label>🏷️ 分类</label>
                <select id="categorySelect">
                    <option value="餐饮">🍜 餐饮</option>
                    <option value="购物">🛍️ 购物</option>
                    <option value="交通">🚗 交通</option>
                    <option value="娱乐">🎮 娱乐</option>
                    <option value="工资">💼 工资</option>
                    <option value="其他">📦 其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>📅 日期</label>
                <input type="date" id="dateInput">
            </div>
        </div>
        <div class="double-btn-group">
            <button class="btn btn-primary" id="saveBtn">➕ 添加记录</button>
            <button class="btn btn-outline" id="cancelEditBtn" style="display: none;">✖️ 取消编辑</button>
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <button class="filter-chip active" data-filter="all">全部</button>
        <button class="filter-chip" data-filter="income">收入</button>
        <button class="filter-chip" data-filter="expense">支出</button>
    </div>

    <!-- 交易列表标题 + 清空按钮 -->
    <div class="transactions-header">
        <h3>📋 流水记录</h3>
        <div class="clear-all-btn" id="clearAllBtn">🗑️ 清空全部</div>
    </div>

    <ul class="transaction-list" id="transactionList">
        <li class="empty-state">✨ 暂无记录，添加一笔试试</li>
    </ul>
    <footer>数据自动保存至本地 · 编辑/删除随心改</footer>
</div>

<script>
    (function(){
        // ---------- 数据模型 ----------
        let transactions = [];      // 每项: { id, description, amount, type, category, date }
        let editingId = null;       // 正在编辑的记录id，null表示新增模式
        let currentFilter = 'all';  // 'all', 'income', 'expense'

        // DOM 元素
        const descInput = document.getElementById('descInput');
        const amountInput = document.getElementById('amountInput');
        const typeSelect = document.getElementById('typeSelect');
        const categorySelect = document.getElementById('categorySelect');
        const dateInput = document.getElementById('dateInput');
        const saveBtn = document.getElementById('saveBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const transactionListEl = document.getElementById('transactionList');
        const balanceAmountSpan = document.getElementById('balanceAmount');
        const totalIncomeSpan = document.getElementById('totalIncome');
        const totalExpenseSpan = document.getElementById('totalExpense');
        const filterChips = document.querySelectorAll('.filter-chip');
        const clearAllBtn = document.getElementById('clearAllBtn');

        // 辅助函数：获取今日 YYYY-MM-DD
        function getTodayStr() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // 设置日期默认今天
        function setDefaultDate() {
            if (!dateInput.value) {
                dateInput.value = getTodayStr();
            }
        }

        // 保存到 localStorage
        function saveToLocalStorage() {
            localStorage.setItem('ledger_transactions', JSON.stringify(transactions));
        }

        // 加载初始数据 (若无则插入几条演示数据)
        function loadInitialData() {
            const stored = localStorage.getItem('ledger_transactions');
            if (stored) {
                try {
                    transactions = JSON.parse(stored);
                    if (!Array.isArray(transactions)) transactions = [];
                } catch(e) { transactions = []; }
            }
            // 如果没有数据，添加几条示例，让界面不空旷
            if (transactions.length === 0) {
                const today = getTodayStr();
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yyyy = yesterday.getFullYear();
                const mm = String(yesterday.getMonth() + 1).padStart(2, '0');
                const dd = String(yesterday.getDate()).padStart(2, '0');
                const yesterdayStr = `${yyyy}-${mm}-${dd}`;
                transactions = [
                    { id: Date.now() + 101, description: '午餐', amount: 38.50, type: 'expense', category: '餐饮', date: yesterdayStr },
                    { id: Date.now() + 102, description: '买书', amount: 79.00, type: 'expense', category: '购物', date: yesterdayStr },
                    { id: Date.now() + 103, description: '工资', amount: 12500.00, type: 'income', category: '工资', date: today },
                    { id: Date.now() + 104, description: '咖啡', amount: 28.00, type: 'expense', category: '餐饮', date: today },
                    { id: Date.now() + 105, description: '滴滴出行', amount: 21.50, type: 'expense', category: '交通', date: today },
                ];
                saveToLocalStorage();
            }
            // 按日期倒序 (最近在前)
            sortTransactions();
        }

        // 按日期降序，同日期按id降序（新加靠前）
        function sortTransactions() {
            transactions.sort((a, b) => {
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                return b.id - a.id;
            });
        }

        // 计算总收入、总支出、余额
        function calculateTotals() {
            let totalIncome = 0;
            let totalExpense = 0;
            transactions.forEach(t => {
                if (t.type === 'income') totalIncome += t.amount;
                else totalExpense += t.amount;
            });
            const balance = totalIncome - totalExpense;
            return { totalIncome, totalExpense, balance };
        }

        // 更新统计UI
        function updateStatsUI() {
            const { totalIncome, totalExpense, balance } = calculateTotals();
            totalIncomeSpan.innerText = `¥${totalIncome.toFixed(2)}`;
            totalExpenseSpan.innerText = `¥${totalExpense.toFixed(2)}`;
            balanceAmountSpan.innerText = `¥${balance.toFixed(2)}`;
        }

        // 根据过滤器筛选交易
        function getFilteredTransactions() {
            if (currentFilter === 'all') return [...transactions];
            return transactions.filter(t => t.type === currentFilter);
        }

        // 渲染交易列表 (基于当前筛选)
        function renderTransactionList() {
            const filtered = getFilteredTransactions();
            if (filtered.length === 0) {
                transactionListEl.innerHTML = '<li class="empty-state">📭 没有符合条件的记录，添加一笔吧～</li>';
                return;
            }

            const fragment = document.createDocumentFragment();
            filtered.forEach(tx => {
                const li = document.createElement('li');
                li.className = 'transaction-item';
                li.dataset.id = tx.id;

                // 左侧信息区
                const infoDiv = document.createElement('div');
                infoDiv.className = 'tx-info';

                const descSpan = document.createElement('div');
                descSpan.className = 'tx-desc';
                const descText = document.createElement('span');
                descText.innerText = tx.description;
                descText.style.fontWeight = '600';
                const categoryBadge = document.createElement('span');
                categoryBadge.className = 'tx-category';
                categoryBadge.innerText = tx.category;
                descSpan.appendChild(descText);
                descSpan.appendChild(categoryBadge);

                const dateSpan = document.createElement('div');
                dateSpan.className = 'tx-date';
                // 格式化展示日期
                dateSpan.innerText = tx.date;
                infoDiv.appendChild(descSpan);
                infoDiv.appendChild(dateSpan);

                // 金额区域
                const amountDiv = document.createElement('div');
                amountDiv.className = 'tx-amount';
                const sign = tx.type === 'income' ? '+' : '-';
                const amountClass = tx.type === 'income' ? 'income-amount' : 'expense-amount';
                amountDiv.innerHTML = `<span class="${amountClass}">${sign} ¥${tx.amount.toFixed(2)}</span>`;

                // 操作按钮
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'tx-actions';
                const editBtn = document.createElement('button');
                editBtn.innerHTML = '✏️';
                editBtn.className = 'icon-btn';
                editBtn.title = '编辑';
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    startEditTransaction(tx.id);
                });
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '🗑️';
                deleteBtn.className = 'icon-btn';
                deleteBtn.title = '删除';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTransactionById(tx.id);
                });
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);

                li.appendChild(infoDiv);
                li.appendChild(amountDiv);
                li.appendChild(actionsDiv);
                fragment.appendChild(li);
            });
            transactionListEl.innerHTML = '';
            transactionListEl.appendChild(fragment);
        }

        // 刷新整个UI：统计 + 列表 + 存储
        function refreshUI() {
            sortTransactions();          // 保持排序
            updateStatsUI();
            renderTransactionList();
            saveToLocalStorage();
        }

        // 开始编辑: 填充表单并切换模式
        function startEditTransaction(id) {
            const targetTx = transactions.find(t => t.id === id);
            if (!targetTx) return;
            editingId = id;
            descInput.value = targetTx.description;
            amountInput.value = targetTx.amount;
            typeSelect.value = targetTx.type;
            categorySelect.value = targetTx.category;
            dateInput.value = targetTx.date;
            saveBtn.textContent = '✏️ 更新记录';
            cancelEditBtn.style.display = 'block';
            // 滚动至表单
            document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // 取消编辑，重置表单和模式
        function cancelEdit() {
            editingId = null;
            resetForm();
            saveBtn.textContent = '➕ 添加记录';
            cancelEditBtn.style.display = 'none';
        }

        // 重置表单（清空输入，但保留默认日期）
        function resetForm() {
            descInput.value = '';
            amountInput.value = '';
            typeSelect.value = 'expense';
            categorySelect.value = '餐饮';
            dateInput.value = getTodayStr();
            // 不重置金额错误样式
        }

        // 添加或更新记录的核心逻辑
        function saveTransaction() {
            // 验证
            const description = descInput.value.trim();
            const amountRaw = amountInput.value.trim();
            if (!description) {
                alert('请填写描述');
                return;
            }
            if (!amountRaw || isNaN(parseFloat(amountRaw)) || parseFloat(amountRaw) <= 0) {
                alert('请输入有效金额 (正数)');
                return;
            }
            const amount = parseFloat(amountRaw);
            const txType = typeSelect.value;
            const category = categorySelect.value;
            let txDate = dateInput.value;
            if (!txDate) txDate = getTodayStr();

            if (editingId !== null) {
                // 更新模式
                const index = transactions.findIndex(t => t.id === editingId);
                if (index !== -1) {
                    transactions[index] = {
                        ...transactions[index],
                        description: description,
                        amount: amount,
                        type: txType,
                        category: category,
                        date: txDate,
                    };
                }
                editingId = null;
                cancelEditBtn.style.display = 'none';
                saveBtn.textContent = '➕ 添加记录';
            } else {
                // 新增模式
                const newId = Date.now();
                const newTransaction = {
                    id: newId,
                    description: description,
                    amount: amount,
                    type: txType,
                    category: category,
                    date: txDate,
                };
                transactions.push(newTransaction);
            }
            sortTransactions();
            refreshUI();
            resetForm();               // 清空为默认状态
            // 友好反馈
            showFloatingMsg('💾 保存成功');
        }

        // 删除单条记录
        function deleteTransactionById(id) {
            const confirmDel = confirm('确定要删除这笔记录吗？');
            if (!confirmDel) return;
            transactions = transactions.filter(t => t.id !== id);
            // 如果正在编辑的条目刚好被删了，取消编辑状态
            if (editingId === id) {
                cancelEdit();
            }
            refreshUI();
            showFloatingMsg('🗑️ 已删除记录');
        }

        // 清空所有数据
        function clearAllTransactions() {
            if (transactions.length === 0) {
                alert('暂无记录可清空');
                return;
            }
            const confirmClear = confirm('⚠️ 危险操作：将清除全部记账记录！无法撤销，确定吗？');
            if (confirmClear) {
                transactions = [];
                if (editingId !== null) cancelEdit();
                refreshUI();
                showFloatingMsg('🧹 所有记录已清空');
            }
        }

        // 轻提示 (临时)
        let toastTimeout = null;
        function showFloatingMsg(msg) {
            let toast = document.getElementById('dynamicToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'dynamicToast';
                toast.style.position = 'fixed';
                toast.style.bottom = '30px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = '#1e293bdd';
                toast.style.backdropFilter = 'blur(8px)';
                toast.style.color = 'white';
                toast.style.padding = '8px 20px';
                toast.style.borderRadius = '40px';
                toast.style.fontSize = '0.85rem';
                toast.style.fontWeight = '500';
                toast.style.zIndex = '999';
                toast.style.pointerEvents = 'none';
                toast.style.whiteSpace = 'nowrap';
                document.body.appendChild(toast);
            }
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.innerText = msg;
            toast.style.opacity = '1';
            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
            }, 1800);
        }

        // 切换筛选
        function setFilter(filterValue) {
            currentFilter = filterValue;
            // 更新chip样式
            filterChips.forEach(chip => {
                const chipFilter = chip.getAttribute('data-filter');
                if (chipFilter === filterValue) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });
            renderTransactionList();   // 只重新渲染列表，不影响统计
        }

        // 绑定筛选按钮
        function bindFilterEvents() {
            filterChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const filterValue = chip.getAttribute('data-filter');
                    setFilter(filterValue);
                });
            });
        }

        // 类型联动：根据收入/支出调整分类选项 (让收入分类倾向于工资/奖金，体验优化)
        function adjustCategoryByType() {
            const selectedType = typeSelect.value;
            if (selectedType === 'income') {
                // 收入时默认分类调为“工资”
                if (categorySelect.value === '餐饮' || categorySelect.value === '购物' || categorySelect.value === '交通' || categorySelect.value === '娱乐') {
                    categorySelect.value = '工资';
                }
                // 确保收入选项包含工资、奖金、其他等
                const incomeOptions = ['工资', '奖金', '兼职', '理财', '其他'];
                // 动态修改option, 但避免完全覆盖，只需确保存在即可，原有其他不冲突，简单处理: 如果当前value不在合理收入选项则设工资
                if (!['工资', '奖金', '兼职', '理财', '其他'].includes(categorySelect.value)) {
                    categorySelect.value = '工资';
                }
            } else {
                // 支出时如果当前分类是工资类的则改为餐饮
                if (categorySelect.value === '工资' || categorySelect.value === '奖金' || categorySelect.value === '理财') {
                    categorySelect.value = '餐饮';
                }
            }
        }
        
        // 完善分类下拉列表的内容 (保持通用分类: 收入类与支出类共享但可选，为了体验)
        function setupCategorySelect() {
            // 合并常见分类，用户自行选择即可，不强制区分
            const allCategories = ['餐饮', '购物', '交通', '娱乐', '工资', '奖金', '医疗', '教育', '其他'];
            const currentVal = categorySelect.value;
            categorySelect.innerHTML = '';
            allCategories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat === '餐饮' ? '🍜 餐饮' : 
                                     (cat === '购物' ? '🛍️ 购物' :
                                     (cat === '交通' ? '🚗 交通' :
                                     (cat === '娱乐' ? '🎮 娱乐' :
                                     (cat === '工资' ? '💼 工资' :
                                     (cat === '奖金' ? '🏆 奖金' :
                                     (cat === '医疗' ? '🏥 医疗' :
                                     (cat === '教育' ? '📚 教育' : '📦 其他'))))))));
                if (currentVal === cat) option.selected = true;
                categorySelect.appendChild(option);
            });
        }

        // 监听类型改变，适配默认分类
        function bindTypeChange() {
            typeSelect.addEventListener('change', adjustCategoryByType);
        }

        // 初始化页面和事件
        function init() {
            loadInitialData();
            sortTransactions();
            setupCategorySelect();
            setDefaultDate();
            adjustCategoryByType();    // 根据初始类型调整分类显示
            refreshUI();
            setFilter('all');          // 默认全部筛选

            // 按钮事件
            saveBtn.addEventListener('click', saveTransaction);
            cancelEditBtn.addEventListener('click', cancelEdit);
            clearAllBtn.addEventListener('click', clearAllTransactions);
            bindFilterEvents();
            bindTypeChange();
            // 额外监听日期输入框如果空值则设置今天
            if (!dateInput.value) dateInput.value = getTodayStr();
        }

        init();
    })();
</script>
</body>
</html>
